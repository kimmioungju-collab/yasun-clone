name: Fetch real market data
on:
  schedule:
    - cron: "*/5 * * * *"   # 5분마다 (GitHub Actions 최소 간격)
  workflow_dispatch:
  push:
    branches: [main]
    paths: [fetch_data.py, .github/workflows/fetch.yml]

permissions:
  contents: write

concurrency:
  group: fetch-data
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch quotes & news
        run: python3 fetch_data.py
      - name: Commit data.json
        run: |
          git config user.name "yasun-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore: update market data $(date -u +%FT%TZ)"
            git push
          fi
